name: Deploy to Azure Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Package and Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build package (skip tests — already validated by build-test workflow)
        run: mvn --no-transfer-progress package -DskipTests

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: equiguard-ai-middleware
          package: target/azure-functions/equiguard-ai-middleware
